name: Claude PR Review (advisory)

# ADVISORY review only. Adapted from the v0-word-archipelago sibling, with the
# auto-merge / fix-push machinery removed: this repo has NO branch protection and
# NO auto-merge, and per Craig the reviewer stays advisory until the pipeline is
# proven. The job posts review comments — it never approves, merges, or pushes.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    # Don't self-trigger on edits to THIS workflow file: claude-code-action
    # refuses to run when its workflow differs from the version on main (a
    # security check) and self-fails with exit 1, leaving a recurring red ✗ on
    # every workflow-edit PR. Comment-driven @claude invocations still fire via
    # the issue_comment trigger below.
    paths-ignore:
      - '.github/workflows/claude-review.yml'
  issue_comment:
    types: [created]

# Workflow default is read-only; the job below adds the write scopes needed to
# POST review comments. Minimum-privilege baseline for any future job here.
permissions:
  contents: read

concurrency:
  # Scope by EVENT TYPE so a bot comment (issue_comment — e.g. vercel[bot]'s
  # preview-deploy comment, which lands on every PR) doesn't share the
  # pull_request review run's group and CANCEL it mid-flight with
  # cancel-in-progress. Within an event type a newer run still supersedes a stale one.
  group: claude-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    # TRUST GATE (pull_request path): run only on NON-DRAFT PRs whose head branch
    # lives in THIS repo (head.repo.full_name == github.repository) — never an
    # outside fork — and not from dependabot or the actions bot. Dependabot PRs
    # are skipped (dependency bumps get human review). issue_comment path: an
    # @claude comment from the repo OWNER/MEMBER on a PR.
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.user.login != 'dependabot[bot]' &&
       github.event.pull_request.user.login != 'github-actions[bot]')
      ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER') &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # post the review + inline comments
      issues: write         # respond on the issue_comment (@claude) path
    timeout-minutes: 20
    steps:
      # Preflight: the OAuth token is the model-auth secret. It is NOT yet set on
      # this repo (interactive `claude setup-token`). Secrets can't be referenced
      # in a job-level `if:`, so gate here: if the token is absent, every real step
      # below is skipped and the job ends GREEN (advisory — a missing token must
      # never wall a PR). Set CLAUDE_CODE_OAUTH_TOKEN to activate the review.
      - name: Check for OAuth token
        id: have_token
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [[ -n "$TOKEN" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN is not set — skipping advisory Claude review. Set the secret to enable it."
          fi

      # Resolve the PR head SHA at trigger time so the checkout pins an immutable
      # commit instead of a mutable branch ref — guards an Untrusted-Checkout
      # TOCTOU on the issue_comment path (a force-push after the trust gate can't
      # swap in different code).
      - name: Resolve PR head SHA
        id: pr-sha
        if: steps.have_token.outputs.present == 'true'
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          SHA=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid --jq .headRefOid)
          if [[ -z "$SHA" || "$SHA" == "null" ]]; then
            echo "Could not resolve head SHA for PR #$PR_NUMBER" >&2
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        if: steps.have_token.outputs.present == 'true'
        with:
          # SHA-pinned (immutable), NOT head.ref — branch refs are mutable.
          ref: ${{ steps.pr-sha.outputs.sha }}
          fetch-depth: 0

      - id: claude
        uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb  # v1
        if: steps.have_token.outputs.present == 'true'
        # NON-GATING: an advisory review must never wall a PR. This is load-bearing
        # on THIS repo: the Claude GitHub App is NOT installed, so we must pass
        # github_token (omitting it makes the OIDC App-token exchange 401). But
        # github_token forces the action into UNTRUSTED mode, which DISCARDS
        # --allowedTools — so the reviewer's Bash/gh calls get denied and it can
        # burn turns (observed: error_max_turns, 30 denials). continue-on-error
        # keeps the check GREEN regardless; the result is reported (non-failing)
        # below. To make the review fully functional, install the Claude Code
        # GitHub App, then drop github_token (trusted mode honors --allowedTools).
        continue-on-error: true
        with:
          # Anthropic MODEL auth (OAuth via Craig's Max subscription). Separate
          # axis from GitHub auth below — both are required.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # GitHub auth: passed EXPLICITLY because the Claude GitHub App is not
          # installed here (OIDC exchange would 401). Trade-off: this forces
          # untrusted mode — see the continue-on-error note above.
          github_token: ${{ github.token }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            You are the code reviewer for Oley Arcade, a v0-origin Next.js
            (App Router) + React 19 site (pnpm@10.34.4, deployed to Vercel) whose
            homepage lists arcade games. This review is ADVISORY ONLY.

            ## What to do
            Review the full PR diff and post your findings as inline review
            comments, followed by one brief summary comment. That is ALL.

            ## What NOT to do (hard rules)
            - Do NOT approve the PR.
            - Do NOT merge or enable auto-merge.
            - Do NOT push commits or edit files.
            This repo has no branch protection and the pipeline is not yet proven —
            you are an advisor; a human reviews your comments and merges.

            ## Review for
            - Correctness: logic errors, off-by-one, broken edge cases, regressions.
            - Whether all callers of a changed function/type were updated.
            - TypeScript: implicit `any`, unsafe casts (`as any`, a non-null `!`
              that hides a real nullable), types that defeat strict mode.
            - Swallowed errors, dead code, duplicated logic.
            - Obvious security issues: injected/committed secrets, unsafe HTML
              (dangerouslySetInnerHTML), unvalidated external input.

            ## Ignore
            - Style/formatting (prettier/eslint territory).
            - Lock files, generated files, build artifacts (e.g. next-env.d.ts).
            - TODO/FIXME comments (intentional).
            - Pre-existing issues unrelated to this PR's diff.
          claude_args: |
            --model claude-opus-4-6
            --max-turns 12
            --allowedTools Read,mcp__github_inline_comment__create_inline_comment

      # REPORT (non-gating): surface the action's result in the run log + step
      # summary WITHOUT failing the check. The is_error/subtype is informational —
      # an advisory review on this repo (untrusted mode, App not installed) may
      # legitimately not complete a full review, and that must not wall a PR. Once
      # the Claude GitHub App is installed and github_token dropped (trusted mode),
      # flip the `exit 0` here to `exit 1` on is_error to restore a real fail-safe.
      - name: Report review outcome (advisory, non-gating)
        if: always() && steps.have_token.outputs.present == 'true'
        env:
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          if [[ -z "$EXEC_FILE" || ! -f "$EXEC_FILE" ]]; then
            echo "claude-code-action produced no execution_file." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          IS_ERROR=$(jq -r '[.[] | select(.type=="result")] | last | .is_error' "$EXEC_FILE" 2>/dev/null)
          SUBTYPE=$(jq -r '[.[] | select(.type=="result")] | last | .subtype // "unknown"' "$EXEC_FILE" 2>/dev/null)
          echo "## Claude advisory review: is_error=$IS_ERROR subtype=$SUBTYPE" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$IS_ERROR" != "false" ]]; then
            echo "::warning::Advisory Claude review did not complete cleanly (is_error=$IS_ERROR, subtype=$SUBTYPE). Non-gating — install the Claude GitHub App for a fully-functional review."
          fi
          exit 0
