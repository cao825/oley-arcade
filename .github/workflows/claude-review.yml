name: Claude PR Review (advisory)

# ADVISORY review, TRUSTED mode. Ports the trusted-mode mechanics from the
# v0-word-archipelago sibling (OIDC App token, --allowedTools honored) but KEEPS
# advisory behavior: review + comment only — NO approve, NO merge, NO push. The
# advisory/merge separation is enforced three ways (see the action step): contents
# permission stays `read` (the App token cannot push/merge), --allowedTools grants
# only read + inline-comment (no Edit/Write/git/gh-pr-merge), and the prompt forbids
# approve/merge/push. Trusted mode requires the Claude Code GitHub App to be
# installed/scoped to this repo (Craig); without it the OIDC exchange fails and the
# is_error fail-safe goes red (never hollow-green).

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    # Don't self-trigger on edits to THIS workflow file: claude-code-action refuses
    # to run when its workflow differs from the version on main (a security check),
    # so it self-fails on workflow-edit PRs. paths-ignore short-circuits the trigger
    # so those PRs don't get a spurious red. Comment-driven @claude still fires via
    # issue_comment below.
    paths-ignore:
      - '.github/workflows/claude-review.yml'
  issue_comment:
    types: [created]

# Workflow default is read-only; the job below adds the write scopes needed to POST
# review comments and the id-token scope the OIDC App-token exchange requires.
permissions:
  contents: read

concurrency:
  # Scope by EVENT TYPE so a bot comment (issue_comment — e.g. vercel[bot]'s
  # preview-deploy comment, which lands on every PR) doesn't share the
  # pull_request review run's group and CANCEL it mid-flight. Within an event type
  # a newer run still supersedes a stale one.
  group: claude-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    # TRUST GATE (pull_request path): run only on NON-DRAFT PRs whose head branch
    # lives in THIS repo (head.repo.full_name == github.repository) — never an
    # outside fork — and not from dependabot or the actions bot. issue_comment
    # path: an @claude comment from the repo OWNER/MEMBER on a PR.
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.user.login != 'dependabot[bot]' &&
       github.event.pull_request.user.login != 'github-actions[bot]')
      ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER') &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      # contents stays READ — advisory: the reviewer must not push or merge (the
      # sibling uses contents: write because it fixes-and-merges; we do not).
      # id-token: write is REQUIRED for the OIDC exchange that mints the trusted
      # Claude App token. pull-requests/issues: write to post the review.
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    timeout-minutes: 20
    steps:
      # Preflight: gate on the model-auth secret. Secrets can't be referenced in a
      # job-level `if:`, so if CLAUDE_CODE_OAUTH_TOKEN is absent every real step
      # below is skipped and the job ends GREEN (a missing/rotated secret must not
      # wall a PR). When present, the steps run and the is_error fail-safe applies.
      - name: Check for OAuth token
        id: have_token
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [[ -n "$TOKEN" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN is not set — skipping advisory Claude review. Set the secret to enable it."
          fi

      # Resolve the PR head SHA at trigger time so the checkout pins an immutable
      # commit instead of a mutable branch ref — guards an Untrusted-Checkout TOCTOU
      # on the issue_comment path (a force-push after the trust gate can't swap in
      # different code).
      - name: Resolve PR head SHA
        id: pr-sha
        if: steps.have_token.outputs.present == 'true'
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          SHA=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid --jq .headRefOid)
          if [[ -z "$SHA" || "$SHA" == "null" ]]; then
            echo "Could not resolve head SHA for PR #$PR_NUMBER" >&2
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        if: steps.have_token.outputs.present == 'true'
        with:
          # SHA-pinned (immutable), NOT head.ref — branch refs are mutable.
          ref: ${{ steps.pr-sha.outputs.sha }}
          fetch-depth: 0

      - id: claude
        # SHA matches the WORKING sibling (v0-word-archipelago / rogue-descent /
        # neon-drift), which runs trusted with permission_denials_count=0. This is a
        # deliberate change from the previous @2fee1551 (Claude Code 2.1.185), which
        # has a claude_args whitespace-split bug (issue #844) that shreds the
        # space-containing --allowedTools Bash patterns below → denials → thrash.
        # @d5726de0 (2.1.177) is the last-known-good; a future forward-bump must
        # re-verify denials=0 before adopting.
        uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102  # v1
        if: steps.have_token.outputs.present == 'true'
        with:
          # Anthropic MODEL auth (OAuth via Craig's Max subscription).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # GitHub auth: intentionally NO github_token. Omitting it makes the action
          # mint a Claude Code GitHub App token via the OIDC exchange (needs the
          # job's id-token: write AND the App installed on this repo). The App token
          # runs the action in TRUSTED mode, where --allowedTools is HONORED.
          # Passing GITHUB_TOKEN instead forced UNTRUSTED mode, which DISCARDS
          # --allowedTools and denied every Bash tool → error_max_turns thrash.
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            You are the code reviewer for Oley Arcade, a v0-origin Next.js
            (App Router) + React 19 site (pnpm@10.34.4, deployed to Vercel) whose
            homepage lists arcade games. This review is ADVISORY ONLY.

            ## What to do
            Review the full PR diff and post your findings as inline review
            comments, followed by one brief summary comment. That is ALL.

            ## What NOT to do (hard rules)
            - Do NOT approve the PR.
            - Do NOT merge or enable auto-merge.
            - Do NOT push commits or edit files.
            This repo has no branch protection and the pipeline is not yet proven —
            you are an advisor; a human reviews your comments and merges.

            ## Review for
            - Correctness: logic errors, off-by-one, broken edge cases, regressions.
            - Whether all callers of a changed function/type were updated.
            - TypeScript: implicit `any`, unsafe casts (`as any`, a non-null `!`
              that hides a real nullable), types that defeat strict mode.
            - Swallowed errors, dead code, duplicated logic.
            - Obvious security issues: injected/committed secrets, unsafe HTML
              (dangerouslySetInnerHTML), unvalidated external input.

            ## Ignore
            - Style/formatting (prettier/eslint territory).
            - Lock files, generated files, build artifacts (e.g. next-env.d.ts).
            - TODO/FIXME comments (intentional).
            - Pre-existing issues unrelated to this PR's diff.
          claude_args: |
            --model claude-opus-4-6
            --max-turns 20
            --allowedTools Read,Bash(gh pr view:*),Bash(gh pr diff:*),mcp__github_inline_comment__create_inline_comment

      # is_error FAIL-SAFE (gating, restored now that we're trusted): the action can
      # exit 0 yet have errored internally (error_max_turns / error_during_execution /
      # a failed OIDC exchange when the App isn't scoped). Parse the execution log's
      # final result and FAIL the check unless is_error is explicitly false — so a
      # broken/hollow run is loud, never silently green. This job is NOT a required
      # check (no branch protection), so a red here surfaces a problem without
      # locking the repo. If the App is not yet scoped, this is what goes red.
      - name: Fail the check if the action errored (no hollow-green review)
        if: always() && steps.have_token.outputs.present == 'true'
        env:
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          if [[ -z "$EXEC_FILE" || ! -f "$EXEC_FILE" ]]; then
            echo "::error::claude-code-action produced no execution_file — treating as a failed run."
            exit 1
          fi
          IS_ERROR=$(jq -r '[.[] | select(.type=="result")] | last | .is_error' "$EXEC_FILE" 2>/dev/null)
          SUBTYPE=$(jq -r '[.[] | select(.type=="result")] | last | .subtype // "unknown"' "$EXEC_FILE" 2>/dev/null)
          DENIALS=$(jq -r '[.[] | select(.type=="result")] | last | .permission_denials_count // 0' "$EXEC_FILE" 2>/dev/null)
          echo "claude-code-action result: is_error=$IS_ERROR subtype=$SUBTYPE permission_denials_count=$DENIALS"
          if [[ "$IS_ERROR" != "false" ]]; then
            echo "::error::claude-code-action did not complete cleanly (is_error=$IS_ERROR, subtype=$SUBTYPE, denials=$DENIALS). If denials>0 / error_max_turns, the Claude GitHub App is likely not scoped to this repo (untrusted mode)."
            exit 1
          fi
