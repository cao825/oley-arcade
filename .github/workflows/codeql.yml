name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly, off-peak. Monday 07:23 UTC — staggered from OSV-Scanner's
    # Wednesday slot so the two security scans don't contend for runners.
    - cron: "23 7 * * 1"

permissions:
  # security-events: write to upload SARIF results to the Security > Code Scanning
  # tab. (This repo is PUBLIC, so Code Scanning is available without GHAS. It was
  # previously `read` + `upload: never` while the repo was private with no GHAS —
  # that made CodeQL a decorative green check whose results went nowhere.)
  # contents/actions: read are required by the CodeQL action to check out the repo
  # and read workflow run metadata.
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      # SHA-pinned (this repo pins actions; bumped by the github-actions
      # Dependabot ecosystem already configured).
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # build-mode: none — JS/TS is interpreted, so CodeQL extracts directly
      # from source with no compilation step (no autobuild needed).
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: javascript-typescript
          build-mode: none
          # security-extended: the full security query suite (broader coverage
          # than the default suite) without the noise of the code-quality queries.
          queries: security-extended
          # Next.js build output (.next/out) and any tests are excluded.
          config: |
            paths-ignore:
              - .next
              - out
              - '**/__tests__/**'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          category: "/language:javascript-typescript"
          # upload defaults to 'always' — SARIF is uploaded to Code Scanning for
          # successful and failed runs, so findings land in the Security tab.
