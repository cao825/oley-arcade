name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly, off-peak. Monday 07:23 UTC — staggered from OSV-Scanner's
    # Wednesday slot so the two security scans don't contend for runners.
    - cron: "23 7 * * 1"

# ADVISORY mode (private repo, no GitHub Advanced Security). The analyze step runs
# the full CodeQL suite but does NOT upload SARIF to Code Scanning — that endpoint
# requires GHAS / a public repo, which this repo doesn't have, and the upload would
# hard-fail the job. Instead the SARIF is published as a build artifact. Re-enable
# the upload (set `upload: always`, restore `security-events: write`, drop the
# artifact step) if the repo goes public or GHAS is purchased.
permissions:
  contents: read
  security-events: read
  actions: read

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: read
      actions: read

    steps:
      # SHA-pinned (this repo pins actions; bumped by the github-actions
      # Dependabot ecosystem already configured).
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # build-mode: none — JS/TS is interpreted, so CodeQL extracts directly
      # from source with no compilation step (no autobuild needed).
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: javascript-typescript
          build-mode: none
          # security-extended: the full security query suite (broader coverage
          # than the default suite) without the noise of the code-quality queries.
          queries: security-extended
          # Next.js build output (.next/out) and any tests are excluded.
          config: |
            paths-ignore:
              - .next
              - out
              - '**/__tests__/**'

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          category: "/language:javascript-typescript"
          # ADVISORY: never upload to Code Scanning (no GHAS on this private repo —
          # the upload would 422/hard-fail). SARIF is written to ./codeql-results
          # and published as an artifact below for offline review.
          upload: never
          output: codeql-results

      - name: Upload CodeQL SARIF as artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: codeql-sarif
          path: codeql-results
          if-no-files-found: warn
          retention-days: 14
